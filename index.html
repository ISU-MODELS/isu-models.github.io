<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Website</title>
    <!-- Load Montserrat font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Remove default margins and set background */
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }

        /* Make SVG full-screen */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        /* Style the text in the SVG mask */
        svg text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 48px;
        }

        /* Position the unmute button */
        #unmute-button {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <!-- SVG for video playing inside text -->
    <svg>
        <defs>
            <!-- Define the mask: black hides, white reveals -->
            <mask id="text-mask">
                <rect width="100%" height="100%" fill="black"/>
                <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="white">Hello Video</text>
            </mask>
        </defs>
        <!-- Video masked by the text -->
        <video mask="url(#text-mask)" width="100%" height="100%" autoplay loop>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </svg>

    <!-- Background audio, starts muted -->
    <audio id="background-audio" loop muted>
        <source src="audio.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Button to toggle mute -->
    <button id="unmute-button">Unmute</button>

    <!-- JavaScript to toggle audio mute -->
    <script>
        const audio = document.getElementById('background-audio');
        const button = document.getElementById('unmute-button');

        button.addEventListener('click', function() {
            audio.muted = !audio.muted;
            button.textContent = audio.muted ? 'Unmute' : 'Mute';
        });
    </script>
</body>
</html>
